<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="main/0.png">
  <title>My Girlfriend</title>
  <style>
    :root {
      --main-bg: linear-gradient(135deg, #ff00ff, #8a2be2, #ff1493, #ee82ee);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--main-bg);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0;
      padding: 20px;
      text-align: center;
      min-height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Rainbow Title */
    h1 {
      font-size: clamp(28px, 9vw, 54px);
      font-weight: bold;
      padding: 15px 30px;
      margin: 40px auto 20px auto;
      border: 4px solid #fff; 
      border-radius: 50px;
      display: inline-block;
      background: linear-gradient(270deg, #ff0000, #ff8c00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbowMove 6s linear infinite;
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
    }

    @keyframes rainbowMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    /* The Selection Container (Glass Effect) */
    .album {
      margin: 30px auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1100px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
    }

    /* Card Styling */
    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 25px;
      overflow: hidden;
      text-decoration: none;
      color: #800000;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 3px solid transparent;
      animation: fadeInUp 0.8s ease backwards;
      z-index: 1;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: #ff69b4;
      box-shadow: 0 15px 35px rgba(255, 20, 147, 0.4);
    }

    /* This is where the GIF lives */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.4; /* Subtle so you can still see the main photo */
      z-index: -1;
      transition: opacity 0.4s ease;
    }

    .card:hover::before {
      opacity: 0.8; /* GIF becomes clearer on hover */
    }

    /* --- YOUR GIF PATHS --- */
    /* Points to the 'gif' folder in your screenshot */
    .card:nth-child(1)::before { background-image: url("gif/gif2025.gif"); }
    .card:nth-child(2)::before { background-image: url("gif/gif2026.gif"); }
    .card:nth-child(3)::before { background-image: url("gif/gif2027.gif"); }
    .card:nth-child(4)::before { background-image: url("gif/gif2028.gif"); }
    .card:nth-child(5)::before { background-image: url("gif/gif2029.gif"); }
    .card:nth-child(6)::before { background-image: url("gif/gif2030.gif"); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Staggered load effect */
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .cap {
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      background: rgba(255, 255, 255, 0.7); /* See-through caption */
      backdrop-filter: blur(10px);
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      .album { padding: 20px; margin: 20px 10px; }
      .card:hover { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

  <h1>Yanna Dilag Garcitos</h1>

  <section class="album">
    <a class="card" href="2025.html" target="_blank">
      <img src="main/1.jpg" alt="2025 Memories">
      <div class="cap">2025</div>
    </a>
    <a class="card" href="2026.html" target="_blank">
      <img src="images/2026.jpg" alt="2026 Memories">
      <div class="cap">2026</div>
    </a>
    <a class="card" href="2027.html" target="_blank">
      <img src="images/2027.jpg" alt="2027 Memories">
      <div class="cap">2027</div>
    </a>
    <a class="card" href="2028.html" target="_blank">
      <img src="images/2028.jpg" alt="2028 Memories">
      <div class="cap">2028</div>
    </a>
    <a class="card" href="2029.html" target="_blank">
      <img src="images/2029.jpg" alt="2029 Memories">
      <div class="cap">2029</div>
    </a>
    <a class="card" href="2030.html" target="_blank">
      <img src="images/2030.jpg" alt="2030 Memories">
      <div class="cap">2030</div>
    </a>
  </section>

</body>
</html>
